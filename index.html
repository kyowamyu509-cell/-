function decrementHaiben(v){
  if(!v) return '';
  if(v==='不明') return '不明';
  const n=parseInt(v,10);
  if(Number.isNaN(n)) return v;
  return String(Math.max(n-1,-10));
}

let db=null;
try{
  firebase.initializeApp(FIREBASE_CONFIG);
  db=firebase.database();
  db.ref('.info/connected').on('value',s=>{
    setSyncStatus(
      s.val()?'ok':'warn',
      s.val()?'Firebase リアルタイム同期中':'再接続中...'
    );
  });
}catch(e){
  console.error(e);
  setSyncStatus('warn','同期エラー');
}

function setSyncStatus(t,txt){
  const d=document.getElementById('syncDot');
  const l=document.getElementById('syncLabel');
  if(!d || !l) return;
  d.className='sync-dot'+(t?' '+t:'');
  l.textContent=txt;
  l.style.color=t==='ok'?'#16a34a':t==='warn'?'#b45309':'#64748b';
}
function encKey(n){
  return encodeURIComponent(n.trim())
    .replace(/\./g,'%2E')
    .replace(/#/g,'%23')
    .replace(/\$/g,'%24')
    .replace(/\[/g,'%5B')
    .replace(/\]/g,'%5D');
}
function ls(k){
  try{
    const v=localStorage.getItem(k);
    return v?JSON.parse(v):null;
  }catch(e){ return null; }
}
function lss(k,v){
  try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){}
}
function emptyDaily(){
  return {renrakucho:'',yakuhenkou:'',megusuri:'',nankou:'',haiben:'',extra:'',memo:''};
}

async function fbGet(path){
  if(!db) return null;
  try{
    const s=await db.ref(path).get();
    return s.exists()?s.val():null;
  }catch(e){
    console.error(e);
    return null;
  }
}
async function fbSet(path,val){
  if(!db) return;
  try{
    await db.ref(path).set(val);
  }catch(e){
    console.error(e);
    setSyncStatus('warn','保存エラー');
  }
}

}

// ------------------------------------------------
// メイン保存
// ------------------------------------------------
async function saveRoomName(r,n){
  lss('rname_'+r,n);
  await fbSet('rooms/'+r+'/name',n);
}
async function saveDaily(room){
  const name=(S[room].name||'').trim();
  if(!name) return false;

  const {_tag,_mt,name:n,...data}=S[room];
  lss('care_'+name+'_'+currentDate,data);
  lss('care_'+name+'_latest',data);

  const k=encKey(name);
  await fbSet(`residents/${k}/dates/${currentDate}`,data);
  await fbSet(`residents/${k}/latest`,data);
  return true;
}
async function readByName(name){
  if(!name||!name.trim()) return {...emptyDaily(),_tag:''};

  const n=name.trim(),k=encKey(n);
  if(db){
    try{
      const td=await fbGet(`residents/${k}/dates/${currentDate}`);
      if(td) return {...emptyDaily(),...td,_tag:'today'};

      const lt=await fbGet(`residents/${k}/latest`);
      if(lt) return {...emptyDaily(),...lt,_tag:'carried'};

      return {...emptyDaily(),_tag:'new'};
    }catch(e){
      console.error(e);
      setSyncStatus('warn','読込エラー');
    }
  }

  const td=ls('care_'+n+'_'+currentDate);
  if(td) return {...emptyDaily(),...td,_tag:'today'};

  const lt=ls('care_'+n+'_latest');
  if(lt) return {...emptyDaily(),...lt,_tag:'carried'};

  return {...emptyDaily(),_tag:'new'};
}

// ------------------------------------------------
// 入れ替え保存
// ------------------------------------------------
async function saveSubRoomName(r,n){

}
async function saveSubDaily(room){
  const name=(SUB[room].name||'').trim();

}
async function readSubByName(name){
  if(!name||!name.trim()) return {...emptyDaily(),_tag:''};

  const n=name.trim(),k=encKey(n);
  if(db){
    try{
      const td=await fbGet(`sub_residents/${k}/dates/${currentDate}`);

      return {...emptyDaily(),_tag:'new'};

  const td=ls('sub_care_'+n+'_'+currentDate);
  if(td) return {...emptyDaily(),...td,_tag:'today'};

  const lt=ls('sub_care_'+n+'_latest');
  if(lt) return {...emptyDaily(),...lt,_tag:'carried'};

  return {...emptyDaily(),_tag:'new'};
}

// ------------------------------------------------
// 体重・身長

async function saveWH(name,month,weight,height){
  if(!name) return;
  const k=encKey(name.trim()),d={weight,height};
  lss('wh_'+name+'_'+month,d);
  await fbSet(`wh/${k}/${month.replace('-','_')}`,d);
}
async function loadWH(name,month){
  if(!name) return {weight:'',height:''};
  const k=encKey(name.trim());
  if(db){
    const d=await fbGet(`wh/${k}/${month.replace('-','_')}`);
    if(d) return d;
  }
  return ls('wh_'+name+'_'+month) || {weight:'',height:''};
}
async function loadWHHistory(name){
  if(!name) return {};
  const k=encKey(name.trim());
  if(db){
    const d=await fbGet(`wh/${k}`);
    if(d) return d;
  }
  const h={};
  for(let i=0;i<24;i++){
    const d=new Date();
    d.setMonth(d.getMonth()-i);
    const m=d.toISOString().slice(0,7);
    const v=ls('wh_'+name+'_'+m);
    if(v) h[m.replace('-','_')]=v;
  }
  return h;
}

// ------------------------------------------------
// リアルタイム監視
// ------------------------------------------------
const listeners={};
const subListeners={};

function listenResident(room,name){
  if(!db || !name) return;

  if(listeners[room]) listeners[room].off();

  const ref=db.ref(`residents/${encKey(name)}/dates/${currentDate}`);
  ref.on('value',snap=>{
    if(!snap.exists()) return;
    const data=snap.val();
    const cur=S[room];

    if(
      YN.some(f=>cur[f.k]!==data[f.k]) ||
      cur.haiben!==data.haiben ||
      cur.extra!==data.extra ||
      cur.memo!==data.memo
    ){
      S[room]={...S[room],...emptyDaily(),...data,_tag:'today'};
      refreshCard(room);
      if(document.getElementById('mainPage2').classList.contains('active')) renderDashboard();
    }
  });
  listeners[room]=ref;
}

function listenSubResident(room,name){
  if(!db || !name) return;

  if(subListeners[room]) subListeners[room].off();

  const ref=db.ref(`sub_residents/${encKey(name)}/dates/${currentDate}`);
  ref.on('value',snap=>{
    if(!snap.exists()) return;
    const data=snap.val();
    const cur=SUB[room];

    if(
      YN.some(f=>cur[f.k]!==data[f.k]) ||
      cur.haiben!==data.haiben ||
      cur.extra!==data.extra ||
      cur.memo!==data.memo
    ){
      SUB[room]={...SUB[room],...emptyDaily(),...data,_tag:'today'};
      refreshSubCard(room);
      if(document.getElementById('mainPage2').classList.contains('active')) renderDashboard();
    }
  });
  subListeners[room]=ref;
}

function setRoomInputEnabled(r,isSub,enabled){
  const prefix=isSub?'sub-':'';

  YN.forEach(f=>{
    const el=document.getElementById(`${prefix}sel-${r}-${f.k}`);
    if(el) el.disabled=!enabled;
  });

  const ex=document.getElementById(`${prefix}sel-${r}-extra`);
  if(ex) ex.disabled=!enabled;

  const hb=document.getElementById(`${prefix}sel-${r}-haiben`);
  if(hb) hb.disabled=!enabled;

  const memo=document.getElementById(`${prefix}memo-${r}`);
  if(memo){
    memo.disabled=!enabled;
    memo.placeholder=enabled?'申し送り内容を入力...':'先にお名前を入力してください';
  }
}

function updateDateNote(){
  const d=new Date(currentDate+'T00:00:00');
  const w=['日','月','火','水','木','金','土'][d.getDay()];
  document.getElementById('dateNote').textContent=currentDate+'（'+w+'）の記録';
}

// ------------------------------------------------
// 初期読込
// ------------------------------------------------
async function loadAll(){
  loadSubVisible();
  loadDischarged();
  await loadExtraLabel();
  await loadLinks();

  for(const r of ALL){
    let name=ls('rname_'+r)||'';
    const fb=await fbGet('rooms/'+r+'/name');
    if(fb) name=fb;
    const data=await readByName(name);
    S[r]={...S[r],...data,name};

    let sname=ls('sub_rname_'+r)||'';
    const sfb=await fbGet('sub_rooms/'+r+'/name');
    if(sfb) sname=sfb;
    const sdata=await readSubByName(sname);
    SUB[r]={...SUB[r],...sdata,name:sname};
  }

  renderAll();

  ALL.forEach(r=>{
    if(S[r].name) listenResident(r,S[r].name);
    if(SUB[r].name) listenSubResident(r,SUB[r].name);
  });
}

// ------------------------------------------------
// 日付変更
// ------------------------------------------------
async function onDateChange(d){
  currentDate=d;
  updateDateNote();

  Object.values(listeners).forEach(r=>r&&r.off&&r.off());
  Object.values(subListeners).forEach(r=>r&&r.off&&r.off());

  for(const r of ALL){
    // ① 退所チェックがある場合 → メインを空にする
    if(discharged[r]){
      S[r]={name:'',...emptyDaily(),_tag:''};
      await saveRoomName(r,'');
      discharged[r]=false;
    }

    // ② 入替者がいればメインへ移行
    if(SUB[r].name && SUB[r].name.trim()){
      const subName=SUB[r].name.trim();

      // ★ 修正: readByName ではなく readSubByName
      const subLatest=await readSubByName(subName);
      const carried={...subLatest};

      if(carried._tag==='carried'){
        carried.haiben=decrementHaiben(carried.haiben);
      }

      S[r]={...emptyDaily(),...carried,name:subName};
      await saveRoomName(r,subName);
      await saveDaily(r);

      // 入替クリア
      SUB[r]={name:'',...emptyDaily(),_tag:''};
      await saveSubRoomName(r,'');
    }else{
      // ③ メイン通常引継
      const data=await readByName(S[r].name);
      if(data._tag==='carried'){
        data.haiben=decrementHaiben(data.haiben);
      }
      S[r]={...S[r],...data};
    }

    // ④ 入替側が残っている場合の通常引継
    if(SUB[r].name){
      const sdata=await readSubByName(SUB[r].name);
      if(sdata._tag==='carried'){
        sdata.haiben=decrementHaiben(sdata.haiben);
      }
      SUB[r]={...SUB[r],...sdata};
    }
  }

  saveDischarged();
  renderAll();

  ALL.forEach(r=>{
    if(S[r].name) listenResident(r,S[r].name);
    if(SUB[r].name) listenSubResident(r,SUB[r].name);
  });
}

function onNameInput(r,v){
  S[r].name=v;
  const el=document.getElementById('name-'+r);
  if(el) el.className='name-input';
  setTag(r,'');
  if(!v.trim()) setRoomInputEnabled(r,false,false);
}
async function onNameBlur(r){
  const name=(S[r].name||'').trim();
  await saveRoomName(r,name);

  if(listeners[r]) listeners[r].off();

  if(!name){
    setTag(r,'');
    setRoomInputEnabled(r,false,false);
    refreshCard(r);
    return;
  }

  const data=await readByName(name);
  S[r]={...S[r],...data,name};
  refreshCard(r);
  listenResident(r,name);

  flash(r,data._tag==='today'?'✓今日':data._tag==='carried'?'↑引継':'✓新規');
}
async function onSel(r,k,v,el){
  if(!(S[r].name||'').trim()){
    S[r][k]='';
    if(el) el.value='';
    flash(r,'先に名前');
    return;
  }

  S[r][k]=v;
  S[r]._tag='today';

  if(k==='haiben') el.className='haiben-sel'+(v?' v-hb':'');
  else el.className='fsel'+(v&&v!=='無'?' v-ari':'');

  const p=prog(r);
  const dot=document.getElementById('dot-'+r);
  if(dot) dot.style.background=dotCol(p);
  updateChip(r,p);

  const ok=await saveDaily(r);
  if(ok) flash(r,'✓ 保存');

  if(document.getElementById('mainPage2').classList.contains('active')) renderDashboard();
}
async function onMemoChange(r,v){
  if(!(S[r].name||'').trim()) return;

  S[r].memo=v;
  S[r]._tag='today';

  clearTimeout(S[r]._mt);
  S[r]._mt=setTimeout(async()=>{
    const ok=await saveDaily(r);
    if(ok) flash(r,'✓ 保存');
  },700);

  if(document.getElementById('mainPage2').classList.contains('active')){
    refreshDashboardMemo();
  }
}
async function clearRoom(r){
  backups[r]={...S[r]};
  lss('backup_'+r,backups[r]);

  S[r]={...S[r],...emptyDaily(),_tag:(S[r].name?'today':'')};
  refreshCard(r);

  if((S[r].name||'').trim()) await saveDaily(r);
  flashRestore(r);

  if(document.getElementById('mainPage2').classList.contains('active')) renderDashboard();
}
async function restoreRoom(r){
  const bk=backups[r]||ls('backup_'+r);
  if(!bk){
    flash(r,'バックアップなし');
    return;
  }

  S[r]={...bk};
  refreshCard(r);

  if((S[r].name||'').trim()) await saveDaily(r);
  flash(r,'✓ 復元');

  if(document.getElementById('mainPage2').classList.contains('active')) renderDashboard();
}
function flashRestore(r){
  const el=document.getElementById('flash-'+r);
  if(!el) return;
  el.innerHTML='クリア　<button class="restore-btn" style="font-size:10px;padding:2px 7px" onclick="restoreRoom('+r+')">元に戻す</button>';
  el.className='flash show';
  clearTimeout(el._ft);
  el._ft=setTimeout(()=>{
    el.className='flash';
    el.textContent='';
  },12000);
}

function toggleDischarge(r){
  discharged[r]=!discharged[r];
  saveDischarged();

  const card=document.getElementById('card-'+r);
  const btn=document.getElementById('discharge-btn-'+r);

  if(card) card.className='card'+(discharged[r]?' discharged':'');
  if(btn){
    btn.className='discharge-btn'+(discharged[r]?' on':'');
    btn.textContent=discharged[r]?'退所済':'退所';
  }
}
function toggleSub(r){
  subVisible[r]=!subVisible[r];
  saveSubVisible();

  const sec=document.getElementById('sub-section-'+r);
  const btn=document.getElementById('sub-toggle-'+r);

  if(sec) sec.className='sub-section'+(subVisible[r]?' visible':'');
  if(btn){
    btn.className='sub-toggle-btn'+(subVisible[r]?' active':'');
    btn.textContent=subVisible[r]?'入替 非表示':'入替 表示';
  }

  if(document.getElementById('mainPage2').classList.contains('active')) renderDashboard();
}

const whCache={};

async function renderWHTable(){
  const month=document.getElementById('whMonth').value||currentDate.slice(0,7);
  const tbody=document.getElementById('whTableBody');
  tbody.innerHTML=`<tr><td colspan="6" style="text-align:center;padding:16px;color:#94a3b8;font-size:12px">読み込み中...</td></tr>`;

  const rows=[];
  for(const r of ALL){
    const name=S[r].name||'';
    const wh=await loadWH(name,month);
    rows.push({r,name,wh});
  }

  tbody.innerHTML=rows.map(({r,name,wh})=>{
    const w=parseFloat(wh.weight)||0;
    const h=parseFloat(wh.height)||0;
    const bmiVal=h>0?(w/((h/100)**2)).toFixed(1):'—';
    const bmiCls=bmiVal==='—'?'':parseFloat(bmiVal)<18.5?'bmi-under':parseFloat(bmiVal)>=25?'bmi-over':'bmi-normal';
    const bmiHtml=bmiVal==='—'?'—':`<span class="bmi-badge ${bmiCls}">${bmiVal}</span>`;
    const dis=!name?'disabled':'';
    return `
      <tr>
        <td><span class="wh-room-badge">${r}</span></td>
        <td style="font-size:13px">${name||'<span style="color:#94a3b8;font-size:12px">未入力</span>'}</td>
        <td><input class="wh-input" type="number" step="0.1" placeholder="—" value="${wh.weight||''}" onchange="onWHChange(${r},this.value,'weight','${month}')" ${dis}></td>
        <td><input class="wh-input" type="number" step="0.1" placeholder="—" value="${wh.height||''}" onchange="onWHChange(${r},this.value,'height','${month}')" ${dis}></td>
        <td>${bmiHtml}</td>
        <td><button class="wh-history-btn" onclick="openWHHistory(${JSON.stringify(name)},${r})" ${dis}>履歴</button></td>
      </tr>
    `;
  }).join('');

  renderWHCharts(rows);
}
async function onWHChange(room,val,field,month){
  const name=(S[room].name||'').trim();
  if(!name) return;

  const key=room+'_'+month;
  if(!whCache[key]) whCache[key]=await loadWH(name,month);

  whCache[key][field]=val;
  await saveWH(name,month,whCache[key].weight||'',whCache[key].height||'');

  const el=document.getElementById('whSaved');
  if(el){
    el.style.opacity=1;
    clearTimeout(el._t);
    el._t=setTimeout(()=>{ el.style.opacity=0; },1500);
  }
}
async function openWHHistory(name,room){
  if(!name) return;

  document.getElementById('modalContent').innerHTML=
    `<button class="modal-close" onclick="closeModal()">×</button>
     <div class="modal-title">${name}　体重・身長履歴</div>
     <div class="hist-chart-wrap"><canvas id="histChart"></canvas></div>
     <div id="histTableWrap"><div class="no-data">読み込み中...</div></div>`;
  document.getElementById('modalBg').style.display='flex';

  const hist=await loadWHHistory(name);
  const months=Object.keys(hist).sort().map(k=>k.replace('_','-'));
  const weights=months.map(m=>parseFloat(hist[m.replace('-','_')]?.weight)||null);
  const heights=months.map(m=>parseFloat(hist[m.replace('-','_')]?.height)||null);

  document.getElementById('histTableWrap').innerHTML=
    `<table class="hist-table">
      <thead>
        <tr><th>年月</th><th>体重(kg)</th><th>身長(cm)</th><th>BMI</th></tr>
      </thead>
      <tbody>
        ${
          months.length
          ? months.slice().reverse().map(m=>{
              const d=hist[m.replace('-','_')]||{};
              const w2=parseFloat(d.weight)||0;
              const h2=parseFloat(d.height)||0;
              const b=h2>0?(w2/((h2/100)**2)).toFixed(1):'—';
              return `<tr><td>${m}</td><td>${d.weight||'—'}</td><td>${d.height||'—'}</td><td>${b}</td></tr>`;
            }).join('')
          : '<tr><td colspan="4" style="text-align:center;color:#94a3b8;padding:12px">データなし</td></tr>'
        }
      </tbody>
    </table>`;

  if(months.length){
    setTimeout(()=>{
      new Chart(document.getElementById('histChart'),{
        type:'line',
        data:{
          labels:months,
          datasets:[
            {
              label:'体重(kg)',
              data:weights,
              borderColor:'#3b82f6',
              backgroundColor:'rgba(59,130,246,0.1)',
              tension:0.3,
              fill:true,
              yAxisID:'y'
            },
            {
              label:'身長(cm)',
              data:heights,
              borderColor:'#10b981',
              tension:0.3,
              fill:false,
              yAxisID:'y1'
            }
          ]
        },
        options:{
          responsive:true,
          maintainAspectRatio:false,
          plugins:{
            legend:{
              position:'bottom',
              labels:{font:{family:'Noto Sans JP',size:11},boxWidth:12}
            }
          },
          scales:{
            y:{position:'left',grid:{color:'#f1f5f9'}},
            y1:{position:'right',grid:{drawOnChartArea:false}}
          }
        }
      });
    },80);
  }
}

let whCharts={};
function renderWHCharts(rows){
  if(whCharts.w) whCharts.w.destroy();
  if(whCharts.b) whCharts.b.destroy();

  const vw=rows.filter(r=>r.wh.weight&&r.name);

  whCharts.w=new Chart(document.getElementById('chartWeight'),{
    type:'bar',
    data:{
      labels:vw.map(r=>r.name),
      datasets:[{
        data:vw.map(r=>parseFloat(r.wh.weight)||0),
        backgroundColor:'#93c5fd',
        borderRadius:5
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{
        x:{grid:{display:false},ticks:{font:{family:'Noto Sans JP',size:10},maxRotation:45}},
        y:{grid:{color:'#f1f5f9'}}
      }
    }
  });

  const bk={'低体重':0,'普通':0,'過体重':0,'不明':0};
  rows.forEach(({wh,name})=>{
    if(!name) return;
    const w2=parseFloat(wh.weight)||0;
    const h2=parseFloat(wh.height)||0;
    if(!w2||!h2){ bk['不明']++; return; }
    const b=w2/((h2/100)**2);
    if(b<18.5) bk['低体重']++;
    else if(b<25) bk['普通']++;
    else bk['過体重']++;
  });

  whCharts.b=new Chart(document.getElementById('chartBMI'),{
    type:'doughnut',
    data:{
      labels:Object.keys(bk),
      datasets:[{
        data:Object.values(bk),
        backgroundColor:['#fca5a5','#86efac','#fcd34d','#e2e8f0'],
        borderWidth:2,
        borderColor:'#fff'
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      plugins:{
        legend:{
          position:'bottom',
          labels:{font:{family:'Noto Sans JP',size:11},boxWidth:12}
        }
      }
    }
  });
}

function prog(r){
  return [S[r].renrakucho,S[r].yakuhenkou,S[r].megusuri,S[r].nankou,S[r].haiben,S[r].extra].filter(v=>v).length;
}
function dotCol(p){
  return p===PROG_MAX ? '#22c55e' : p>0 ? '#f59e0b' : '#cbd5e1';
}
function updateChip(r,p){
  const c=document.getElementById('chip-'+r);
  if(!c) return;
  c.className='chip'+(p===PROG_MAX?' done':p>0?' partial':'');
  c.querySelector('.chip-sub').textContent=p+'/'+PROG_MAX;
}

function refreshCard(r){
  const d=S[r];
  const p=prog(r);

  YN.forEach(f=>{
    const el=document.getElementById('sel-'+r+'-'+f.k);
    if(!el) return;
    el.value=d[f.k]||'';
    el.className='fsel'+(d[f.k]==='有'?' v-ari':'');
  });

  const hb=document.getElementById('sel-'+r+'-haiben');
  if(hb){
    hb.value=d.haiben||'';
    hb.className='haiben-sel'+(d.haiben?' v-hb':'');
  }

  const ex=document.getElementById('sel-'+r+'-extra');
  if(ex){
    ex.value=d.extra||'';
    ex.className='fsel'+(d.extra?' v-ari':'');
  }

  const memo=document.getElementById('memo-'+r);
  if(memo) memo.value=d.memo||'';

  const ni=document.getElementById('name-'+r);
  if(ni){
    ni.value=d.name||'';
    ni.className='name-input'+(d._tag==='today'?' loaded':d._tag==='carried'?' carried':'');

    btn.className='discharge-btn'+(discharged[r]?' on':'');
    btn.textContent=discharged[r]?'退所済':'退所';
  }

  setTag(r,d._tag);
  updateChip(r,p);
  setRoomInputEnabled(r,false,!!(d.name||'').trim());

function refreshSubCard(r){

function refreshDashboardMemo(){
  const memoEl=document.getElementById('memoList');
  if(!memoEl) return;

  const items=[];
  ALL.forEach(r=>{
    const isF1=F1_SET.has(r);

    if(S[r].memo&&S[r].memo.trim()){
      const hbTxt=S[r].haiben
        ? `<span style="display:inline-block;background:#f0f9ff;border:1px solid #bae6fd;border-radius:5px;font-size:10px;padding:1px 6px;margin-right:6px;color:#0369a1">排便${S[r].haiben}日</span>`
        : '';
      items.push(`
        <div class="memo-item${isF1?'':' f2'}" style="cursor:pointer" onclick="openMemoDetail(${r},false)">
          <div class="memo-room">${r}号室　${isF1?'1F':'2F'} <span style="font-size:9px;opacity:0.6">▶ 詳細</span></div>
          <div class="memo-name">${S[r].name||'（名前未入力）'}</div>
          <div class="memo-text">${hbTxt}${S[r].memo.replace(/\n/g,'<br>')}</div>
        </div>
      `);
    }

    if(subVisible[r]&&SUB[r].memo&&SUB[r].memo.trim()){
      const hbTxt=SUB[r].haiben
        ? `<span style="display:inline-block;background:#f5f3ff;border:1px solid #c4b5fd;border-radius:5px;font-size:10px;padding:1px 6px;margin-right:6px;color:#7c3aed">排便${SUB[r].haiben}日</span>`
        : '';
      items.push(`
        <div class="memo-item sub" style="cursor:pointer" onclick="openMemoDetail(${r},true)">
          <div class="memo-room">${r}号室　入替 <span style="font-size:9px;opacity:0.6">▶ 詳細</span></div>
          <div class="memo-name">${SUB[r].name||'（名前未入力）'}</div>
          <div class="memo-text">${hbTxt}${SUB[r].memo.replace(/\n/g,'<br>')}</div>
        </div>
      `);
    }
  });

  memoEl.innerHTML=items.length ? items.join('') : '<div class="no-data">申し送りはありません</div>';
}

let dbCharts={};
function ddc(id){
  if(dbCharts[id]){
    dbCharts[id].destroy();
    delete dbCharts[id];
  }
}
function renderDashboard(){
  const done=ALL.filter(r=>prog(r)===PROG_MAX).length;
  const partial=ALL.filter(r=>{
    const p=prog(r);
    return p>0&&p<PROG_MAX;
  }).length;

  document.getElementById('stat-done').textContent=done;
